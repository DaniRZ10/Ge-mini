<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ge-mini — Un clon de ChatGPT potenciado por Google Gemini" />
  <title>Ge-mini · Chat IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════
       RESET & CUSTOM PROPERTIES
       ═══════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Palette — dark mode */
      --bg-primary:    #0d0d0d;
      --bg-secondary:  #1a1a2e;
      --bg-surface:    #16213e;
      --bg-input:      #1e1e3a;
      --border-subtle: #2a2a4a;
      --text-primary:  #e8e8f0;
      --text-secondary:#9a9ab0;
      --accent:        #6c63ff;
      --accent-hover:  #7f78ff;
      --accent-glow:   rgba(108, 99, 255, 0.25);
      --msg-user-bg:   #2a2a4a;
      --msg-ai-bg:     #1a1a2e;
      --danger:        #ff6b6b;
      --success:       #4ecdc4;
      --radius:        12px;
      --radius-sm:     8px;
      --transition:    0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-main:     'Inter', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-main);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════
       APP LAYOUT — CSS Grid (full-viewport)
       ═══════════════════════════════════════════ */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────── */
    #chat-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-subtle);
      background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
    }

    #chat-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--success) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1);   opacity: 1;   }
      50%      { transform: scale(1.4); opacity: 0.6; }
    }

    /* ── Messages area ──────────────────────── */
    #messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px 16px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    /* Scrollbar personalizado */
    #messages::-webkit-scrollbar {
      width: 6px;
    }
    #messages::-webkit-scrollbar-track {
      background: transparent;
    }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 3px;
    }

    /* Burbuja de mensaje */
    .message {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.935rem;
      animation: msg-in 0.35s var(--transition) both;
      position: relative;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--msg-user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      align-self: flex-start;
      background: var(--msg-ai-bg);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }

    .message .label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .message.ai .label {
      color: var(--accent);
    }

    /* ── Estilos de Markdown ── */
    .markdown-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .markdown-body p {
      line-height: 1.6;
    }

    .markdown-body strong {
      color: #fff;
      font-weight: 600;
    }

    .markdown-body ul, .markdown-body ol {
      padding-left: 20px;
      margin: 4px 0;
    }

    .markdown-body li {
      margin-bottom: 4px;
    }

    .markdown-body code {
      background: rgba(0, 0, 0, 0.4);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
      font-size: 0.9em;
      color: var(--success);
    }

    .markdown-body pre {
      background: #0b0b13; /* Un fondo negro elegante */
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border-subtle);
      margin-top: 4px;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
      color: #e8e8f0; /* Color primario claro para el código */
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* Placeholder vacío */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-secondary);
      user-select: none;
    }

    #empty-state .icon {
      font-size: 3rem;
      opacity: 0.4;
    }

    #empty-state p {
      font-size: 0.95rem;
    }

    /* ── Input area ─────────────────────────── */
    #input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-secondary);
    }

    #user-input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 0.92rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      resize: none;
    }

    #user-input::placeholder {
      color: var(--text-secondary);
    }

    #user-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      flex-shrink: 0;
    }

    #send-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    #send-btn:active {
      transform: scale(0.96);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      align-self: flex-start;
      background: var(--msg-ai-bg);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s;  }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0);   }
      30%           { transform: translateY(-8px); }
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      #app {
        max-width: 100%;
      }

      .message {
        max-width: 88%;
        font-size: 0.88rem;
      }

      #input-area {
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <!-- ═══════════ APP SHELL ═══════════ -->
  <main id="app">

    <!-- ── Header ── -->
    <header id="chat-header">
      <span class="logo-dot" aria-hidden="true"></span>
      <h1>Ge-mini</h1>
    </header>

    <!-- ── Messages ── -->
    <section id="messages" aria-live="polite" aria-label="Conversación del chat">
      <div id="empty-state">
        <span class="icon" aria-hidden="true">✦</span>
        <p>Escribe un mensaje para comenzar</p>
      </div>
    </section>

    <!-- ── Input ── -->
    <form id="input-area" autocomplete="off">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Envía un mensaje a Ge-mini…"
        aria-label="Escribe tu mensaje"
      ></textarea>
      <button type="submit" id="send-btn" aria-label="Enviar mensaje">
        ➤
      </button>
    </form>

  </main>

  <!-- ═══════════ SCRIPT ═══════════ -->
  <script>
    const messagesEl = document.getElementById("messages");
    const emptyState = document.getElementById("empty-state");
    const form       = document.getElementById("input-area");
    const input      = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");

    /**
     * Crea un elemento de mensaje y lo añade al chat.
     * @param {"user"|"ai"} role
     * @param {string} text
     */
    function addMessage(role, text) {
      // Ocultar estado vacío al primer mensaje
      if (emptyState) emptyState.remove();

      const bubble = document.createElement("div");
      bubble.classList.add("message", role);

      const label = document.createElement("span");
      label.classList.add("label");
      label.textContent = role === "user" ? "Tú" : "Ge-mini";

      const body = document.createElement("div");
      
      if (role === "ai") {
        body.classList.add("markdown-body");
        body.innerHTML = marked.parse(text);
      } else {
        body.textContent = text;
      }

      bubble.appendChild(label);
      bubble.appendChild(body);
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /** Muestra el indicador de "escribiendo..." */
    function showTyping() {
      const el = document.createElement("div");
      el.classList.add("typing-indicator");
      el.id = "typing";
      el.innerHTML = "<span></span><span></span><span></span>";
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /** Elimina el indicador de "escribiendo..." */
    function hideTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    /**
     * Envía el mensaje al backend y muestra la respuesta.
     */
    async function handleSubmit() {
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";
      input.focus();
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) {
          let errorDetail = `Error ${res.status}`;
          try {
            const errData = await res.json();
            if (errData.detail) errorDetail = errData.detail;
          } catch (e) {}
          throw new Error(errorDetail);
        }

        const data = await res.json();
        hideTyping();
        addMessage("ai", data.response);
      } catch (err) {
        hideTyping();
        addMessage("ai", `⚠️ Error de conexión: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
      }
    }

    // ── Event listeners ──
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      handleSubmit();
    });

    // Enter envía, Shift+Enter salta de línea
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSubmit();
      }
    });

    // Auto-resize del textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });
  </script>
</body>
</html>

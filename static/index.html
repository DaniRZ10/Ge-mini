<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ge-mini — Un clon de ChatGPT potenciado por Google Gemini" />
  <title>Ge-mini · Chat IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════
       RESET & CUSTOM PROPERTIES
       ═══════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --bg-primary:    #0f1115;
      --bg-secondary:  #1b1d24;
      --bg-sidebar:    #16181d;
      --bg-input:      #232630;
      --border-subtle: #2d303a;
      --text-primary:  #e0e0e0;
      --text-secondary:#9094a0;
      --accent:        #6366f1;
      --accent-hover:  #4f46e5;
      --accent-glow:   rgba(99, 102, 241, 0.2);
      --msg-user-bg:   #2d303a;
      --msg-ai-bg:     transparent;
      --danger:        #ef4444;
      --success:       #10b981;
      --radius:        12px;
      --transition:    0.2s ease-in-out;
      --font-main:     'Inter', sans-serif;
    }

    html, body {
      height: 100vh;
      font-family: var(--font-main);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden; /* El scroll va por zonas */
    }

    /* Scrollbar minimalista global a webkit */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f4250; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #505465; }

    /* ═══════════════════════════════════════════
       APP LAYOUT — Sidebar + Main
       ═══════════════════════════════════════════ */
    #layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
      flex-shrink: 0;
    }

    #new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-main);
    }

    #new-chat-btn:hover {
      background: var(--bg-input);
      border-color: #4b4e5f;
    }

    .sidebar-section-title {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 8px;
    }

    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px; /* Espacio entre conversaciones */
      background: rgba(255, 255, 255, 0.03); /* Fondo sutil para distinguir */
      font-size: 0.9rem;
      color: var(--text-secondary);
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: var(--transition);
    }
    .history-item:hover {
      background: var(--bg-input);
      color: var(--text-primary);
      border-color: var(--border-subtle);
    }

    /* ── Model Selector Styling ── */
    #model-selector {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      color: var(--text-primary);
      padding: 10px;
      font-family: var(--font-main);
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 14px;
      transition: var(--transition);
    }

    #model-selector:hover {
      border-color: #4b4e5f;
    }

    #model-selector optgroup {
      background: var(--bg-sidebar);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    #model-selector option {
      background: var(--bg-sidebar);
      color: var(--text-primary);
      padding: 8px;
    }

    /* ── MAIN VIEW (Chat Central) ── */
    #chat-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      position: relative;
    }

    #chat-header {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-bottom: 1px solid transparent;
    }

    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 10px var(--accent-glow);
      margin-right: 12px;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    /* ── MESSAGES ── */
    #messages-wrapper {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centrar burbujas en monitores grandes */
    }

    #messages {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 24px 24px 180px 24px; /* Mayor relleno para el input flotante multi-línea */
    }

    .message {
      width: 100%;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      font-size: 0.95rem;
      animation: msg-in 0.3s ease-out both;
    }

    .message.user {
      align-items: flex-end;
    }
    
    .message.user .content {
      background: var(--msg-user-bg);
      padding: 14px 18px;
      border-radius: 18px;
      max-width: 85%;
      white-space: pre-wrap; /* SOLUCIÓN: El Enter ahora se ve como línea nueva en HTML */
    }

    .message.ai {
      align-items: flex-start;
      margin-top: 10px;
    }

    .message.ai .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .message.ai .content {
      max-width: 100%;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── ESTILOS MARKDOWN ── */
    .markdown-body { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .markdown-body p { line-height: 1.6; }
    .markdown-body strong { color: #fff; font-weight: 600; }
    .markdown-body ul, .markdown-body ol { padding-left: 20px; margin: 4px 0; }
    .markdown-body li { margin-bottom: 4px; }
    
    .markdown-body code {
      background: rgba(0, 0, 0, 0.4);
      padding: 3px 6px;
      border-radius: 4px;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.9em;
      color: var(--success);
    }
    
    .markdown-body pre {
      background: #090a0d;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      border: 1px solid var(--border-subtle);
      margin-top: 6px;
      font-size: 0.9em;
    }
    .markdown-body pre code { background: none; padding: 0; color: #e8e8f0; }

    #empty-state {
      align-self: center;
      margin-top: 30vh;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: var(--text-secondary);
      text-align: center;
    }
    #empty-state .icon { font-size: 2.5rem; opacity: 0.5; }

    /* ── INPUT FLOTANTE ── */
    #input-container {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px;
      background: linear-gradient(0deg, var(--bg-primary) 60%, transparent 100%);
      display: flex;
      justify-content: center;
    }

    #input-area {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center; /* Alineado al centro verticalmente */
      gap: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    
    #input-area:focus-within {
      border-color: #4b4e5f;
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 0.95rem;
      outline: none;
      resize: none;
      max-height: 200px;
      line-height: 1.5;
      padding: 12px 0; /* Padding equilibrado arriba y abajo */
    }
    #user-input::placeholder { color: #64687a; }

    #send-btn {
      width: 48px; height: 48px;
      border: none; border-radius: var(--radius);
      background: var(--accent); color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* Indicador de escribiendo */
    .typing-indicator { display: flex; gap: 5px; flex-wrap: nowrap; margin-top: 6px;}
    .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1s infinite alternate; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      #sidebar { display: none; } /* En móvil se ocultaría de momento por simpleza */
    }
  </style>
</head>

<body>
  <div id="layout">
    
    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <button id="new-chat-btn">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg>
        Nuevo Chat
      </button>

      <div class="sidebar-section-title">Modelo de IA</div>
      <select id="model-selector">
        <optgroup label="Google Gemini">
          <option value="gemini-2.0-flash" selected>Gemini 2.0 Flash</option>
          <option value="gemini-2.5-flash">Gemini 2.5 Flash (Sin tokens)</option>
          <option value="gemini-flash-latest">Gemini Flash (Estable)</option>
        </optgroup>
        <optgroup label="OpenAI (Sin Saldo)">
          <option value="gpt-4o">GPT-4o (Requiere Pago)</option>
          <option value="gpt-4o-mini">GPT-4o Mini (Requiere Pago)</option>
        </optgroup>
        <optgroup label="Open Source (Groq)">
          <option value="llama-3.3-70b-versatile">Llama 3.3 (70B)</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 (8B)</option>
        </optgroup>
      </select>

      <div class="sidebar-section-title">Historial (Demo)</div>
      <div class="history-list">
        <div class="history-item">Consultas de números primos</div>
        <div class="history-item">El tiempo en Sevilla</div>
        <div class="history-item">Ejemplo estático 3</div>
      </div>
    </aside>

    <!-- ── Main Chat Area ── -->
    <main id="chat-view">
      <header id="chat-header">
        <span class="logo-dot"></span> Ge-mini
      </header>

      <section id="messages-wrapper">
        <div id="messages" aria-live="polite">
          <div id="empty-state">
            <span class="icon">✦</span>
            <h2>¿En qué te puedo ayudar?</h2>
          </div>
        </div>
      </section>

      <!-- ── Input Area Flotante ── -->
      <div id="input-container">
        <form id="input-area" autocomplete="off">
          <textarea id="user-input" rows="1" placeholder="Habla con Ge-mini..." autofocus></textarea>
          <button type="submit" id="send-btn" aria-label="Enviar">➤</button>
        </form>
      </div>
    </main>

  </div>

  <script>
    const messagesWrapper = document.getElementById("messages-wrapper");
    const messagesEl = document.getElementById("messages");
    const emptyState = document.getElementById("empty-state");
    const form       = document.getElementById("input-area");
    const input      = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");
    const newChatBtn = document.getElementById("new-chat-btn");
    const modelSelector = document.getElementById("model-selector");

    function addMessage(role, text) {
      if (emptyState) emptyState.style.display = 'none';

      const bubble = document.createElement("div");
      bubble.classList.add("message", role);

      const content = document.createElement("div");
      content.classList.add("content");

      if (role === "ai") {
        const label = document.createElement("div");
        label.classList.add("label");
        label.innerHTML = `<span class="logo-dot" style="margin-right:2px; animation:none; width:8px; height:8px;"></span> Ge-mini`;
        bubble.appendChild(label);
        
        content.classList.add("markdown-body");
        content.innerHTML = marked.parse(text);
      } else {
        // En el user message, textContent respetará los \n gracias a we-space: pre-wrap en CSS
        content.textContent = text;
      }

      bubble.appendChild(content);
      messagesEl.appendChild(bubble);
      scrollToBottom();
    }

    function showTyping() {
      const el = document.createElement("div");
      el.classList.add("message", "ai");
      el.id = "typing";
      
      const label = document.createElement("div");
      label.classList.add("label");
      label.innerHTML = `<span class="logo-dot" style="margin-right:2px; animation:pulse-dot 1s infinite; width:8px; height:8px;"></span> Pensando...`;
      
      const dots = document.createElement("div");
      dots.classList.add("typing-indicator");
      dots.innerHTML = "<span></span><span></span><span></span>";
      
      el.appendChild(label);
      el.appendChild(dots);
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    function scrollToBottom() {
      // Usamos un pequeño delay para asegurar que el Markdown se ha renderizado
      setTimeout(() => {
        messagesWrapper.scrollTo({
          top: messagesWrapper.scrollHeight,
          behavior: 'smooth'
        });
      }, 50);
    }

    async function handleSubmit() {
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", input.value); // Enviamos el value real con los saltos de linea
      
      // Reset input
      input.value = "";
      input.style.height = "auto";
      input.focus();
      sendBtn.disabled = true;
      
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            message: text,
            model: modelSelector.value 
          }),
        });

        if (!res.ok) {
          let errorDetail = `Error HTTP ${res.status}`;
          try {
            const errData = await res.json();
            if (errData.detail) errorDetail = errData.detail;
          } catch (e) {}
          throw new Error(errorDetail);
        }

        const data = await res.json();
        hideTyping();
        addMessage("ai", data.response);
      } catch (err) {
        hideTyping();
        addMessage("ai", `⚠️ **Error de conexión:** \n${err.message}`);
      } finally {
        sendBtn.disabled = false;
      }
    }

    // ── Limpiar Memoria (Nuevo Chat) ──
    newChatBtn.addEventListener("click", async () => {
      try {
        await fetch("/api/clear", { method: "POST" });
        messagesEl.innerHTML = ""; // Vaciamos pantalla
        if(emptyState) {
          emptyState.style.display = 'flex';
          messagesEl.appendChild(emptyState);
        }
      } catch(e) {
         alert("Ocurrió un error al limpiar el chat.");
      }
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      handleSubmit();
    });

    // Enter para enviar, Shift+Enter para salto de línea
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSubmit();
      }
    });

    // Auto-resize fluido
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 200) + "px";
    });
  </script>
</body>
</html>
